name: Build Unica Codex Plugin

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".agents/plugins/marketplace.json"
      - ".github/workflows/unica-plugin-release.yml"
      - ".github/workflows/publish-unica-marketplace.yml"
      - "AGENTS.md"
      - "Cargo.toml"
      - "Cargo.lock"
      - "README.md"
      - "crates/unica-bootstrap/**"
      - "crates/unica-coder/**"
      - "plugins/unica/**"
      - "scripts/ci/**"
      - "scripts/install-unica.sh"
      - "scripts/install-unica.ps1"
      - "tests/ci/**"
      - "tests/fixtures/**"
      - "docs/releases/**"
      - "spec/**"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    outputs:
      release_artifacts: ${{ steps.scope.outputs.release_artifacts }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "release_artifacts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only FETCH_HEAD...HEAD | python scripts/ci/classify-workflow-changes.py |
            sed 's/^/release_artifacts=/' >> "$GITHUB_OUTPUT"

  verify-source:
    name: Verify source guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r tests/ci/requirements.txt
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: python -m unittest discover -s tests/ci
      - run: python -m py_compile scripts/ci/*.py tests/ci/*.py
      - run: python scripts/ci/check-version-contract.py
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace -- --test-threads=1

  test-rust-platforms:
    name: Rust tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace -- --test-threads=1

  verify-installers:
    name: Verify installer shim (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify POSIX shim
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/install-unica.sh --help
      - name: Verify PowerShell shim
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\install-unica.ps1 -Help

  build-tools:
    name: Build tools (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: [classify-changes, verify-source, test-rust-platforms, verify-installers]
    if: ${{ github.event_name != 'pull_request' || needs.classify-changes.outputs.release_artifacts == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build target bundle and bootstrap
        run: >
          python scripts/ci/build-unica-tools.py
          --repo-root .
          --target "${{ matrix.target }}"
          --lock-file plugins/unica/third-party/tools.lock.json
          --out-dir ".build/tool-bundles/${{ matrix.target }}"
          --work-dir ".build/tool-work/${{ matrix.target }}"
      - name: Check bundled tool contracts
        run: >
          python scripts/ci/check-tool-contracts.py
          --target "${{ matrix.target }}"
          --tools-dir ".build/tool-bundles/${{ matrix.target }}/bin/${{ matrix.target }}"
      - name: Smoke packaged Unica MCP
        shell: bash
        run: |
          executable=".build/tool-bundles/${{ matrix.target }}/bin/${{ matrix.target }}/unica"
          if [ "${{ matrix.target }}" = "win-x64" ]; then executable="${executable}.exe"; fi
          python scripts/ci/smoke-unica-mcp.py \
            --binary "$executable" \
            --plugin-root ".build/tool-bundles/${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: unica-tools-${{ matrix.target }}
          path: .build/tool-bundles/${{ matrix.target }}
          if-no-files-found: error

  package-runtime:
    name: Package runtime (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build-tools
    strategy:
      fail-fast: false
      matrix:
        target: [darwin-arm64, linux-x64, win-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: unica-tools-${{ matrix.target }}
          path: .build/bundle
      - run: >
          python scripts/ci/package-unica-runtime.py
          --bundle-root .build/bundle
          --out-dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: unica-runtime-${{ matrix.target }}
          path: |
            dist/unica-runtime-${{ matrix.target }}.tar.gz
            dist/unica-runtime-${{ matrix.target }}.json
          if-no-files-found: error

  package-thin:
    name: Package thin marketplace payload
    runs-on: ubuntu-latest
    needs: package-runtime
    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.7.6' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: unica-runtime-*
          path: .build/runtime-metadata
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: unica-tools-*
          path: .build/bootstrap-root
          merge-multiple: true
      - run: >
          python scripts/ci/package-unica-plugin.py
          --repo-root .
          --runtime-metadata-root .build/runtime-metadata
          --bootstrap-root .build/bootstrap-root
          --release-tag "$RELEASE_TAG"
          --source-commit "${{ github.sha }}"
          --out-dir dist/thin
      - uses: actions/upload-artifact@v4
        with:
          name: unica-thin-marketplace
          path: dist/thin/marketplace
          include-hidden-files: true
          if-no-files-found: error

  probe-thin-bootstrap:
    name: Probe thin bootstrap (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: package-thin
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-2022
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: unica-thin-marketplace
          path: .build/thin
      - name: Probe packaged bootstrap through the downloader
        run: >
          python scripts/ci/smoke-unica-bootstrap.py
          --plugin-root .build/thin/plugins/unica
          --target "${{ matrix.target }}"
          --expect-download-failure

  legacy-migration-preflight:
    name: Preflight legacy Unica migration (${{ matrix.legacy_managed_name }})
    runs-on: windows-2022
    needs: package-thin
    strategy:
      fail-fast: false
      matrix:
        legacy_managed_name: [unica-local, unica]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: unica-thin-marketplace
          path: .build/thin
      - name: Download pinned Codex and previous stable Unica
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path .build\downloads, .build\codex, .build\legacy | Out-Null
          gh release download rust-v0.145.0-alpha.18 --repo openai/codex --pattern codex-x86_64-pc-windows-msvc.exe.zip --dir .build\downloads
          gh release download v0.6.1 --repo IngvarConsulting/unica --pattern unica-codex-marketplace-win-x64.zip --dir .build\downloads
          $codexHash = (Get-FileHash -Algorithm SHA256 .build\downloads\codex-x86_64-pc-windows-msvc.exe.zip).Hash.ToLowerInvariant()
          $legacyHash = (Get-FileHash -Algorithm SHA256 .build\downloads\unica-codex-marketplace-win-x64.zip).Hash.ToLowerInvariant()
          if ($codexHash -ne "f719bcb43de2bcfed3af1055e53a57fa9b7ed00dcbce70c13ec71fd1f41ba86a") { throw "pinned Codex archive checksum mismatch" }
          if ($legacyHash -ne "ae8e7269d5fce2f29b9ea4947297b92d7c7d04d1bcb6c9334127c7c6fd85e499") { throw "legacy Unica archive checksum mismatch" }
          Expand-Archive -LiteralPath .build\downloads\codex-x86_64-pc-windows-msvc.exe.zip -DestinationPath .build\codex
          Expand-Archive -LiteralPath .build\downloads\unica-codex-marketplace-win-x64.zip -DestinationPath .build\legacy
          Copy-Item -LiteralPath .build\codex\codex-x86_64-pc-windows-msvc.exe -Destination .build\codex\codex.exe
      - name: Classify the previous stable installation with the candidate bootstrap
        shell: powershell
        run: >
          .\scripts\ci\test-unica-upgrade.ps1
          -CodexPath .build\codex\codex.exe
          -LegacyMarketplaceRoot .build\legacy\unica-codex-marketplace-win-x64
          -CandidatePluginRoot .build\thin\plugins\unica
          -ReportPath .build\reports\legacy-migration-preflight.json
          -LegacyManagedName "${{ matrix.legacy_managed_name }}"
          -Mode Preflight
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unica-legacy-migration-preflight-${{ matrix.legacy_managed_name }}
          path: .build/reports/legacy-migration-preflight.json
          if-no-files-found: warn

  installer:
    name: Package installer shims
    runs-on: ubuntu-latest
    needs: verify-installers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: unica-installer
          path: |
            scripts/install-unica.sh
            scripts/install-unica.ps1
          if-no-files-found: error

  release-assessment:
    name: Assess Linux runtime on BSP
    runs-on: ubuntu-latest
    needs: package-runtime
    if: ${{ always() && needs.package-runtime.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: unica-runtime-linux-x64
          path: dist/runtime
      - name: Run release assessment
        run: >
          python scripts/ci/release-assessment.py
          --package-archive dist/runtime/unica-runtime-linux-x64.tar.gz
          --work-dir .build/release-assessment
          --out-dir dist/release-assessment
          --bsp-ref 3.2.1.446
          --release-tag "${{ github.ref_name }}"
          --github-run-id "${{ github.run_id }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unica-release-assessment
          path: dist/release-assessment
          if-no-files-found: warn

  publish-release-assets:
    name: Publish runtime and transition assets
    runs-on: ubuntu-latest
    needs:
      - package-runtime
      - installer
      - legacy-migration-preflight
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: unica-runtime-*
          path: dist/runtime
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: unica-installer
          path: dist/installer
      - uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          files: |
            dist/runtime/unica-runtime-*.tar.gz
            dist/runtime/unica-runtime-*.json
            dist/installer/install-unica.sh
            dist/installer/install-unica.ps1

  smoke-thin-plugin:
    name: Smoke published thin plugin (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: [package-thin, publish-release-assets]
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-2022
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: unica-thin-marketplace
          path: .build/thin
      - name: Smoke packaged bootstrap against published runtime
        run: >
          python scripts/ci/smoke-unica-bootstrap.py
          --plugin-root .build/thin/plugins/unica
          --target "${{ matrix.target }}"

  verify-published-assets:
    name: Re-download and verify published bytes
    runs-on: ubuntu-latest
    needs:
      - publish-release-assets
      - package-thin
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download release assets from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "$GITHUB_REF_NAME" --pattern 'unica-runtime-*' --dir published
      - run: python scripts/ci/verify-release-assets.py --asset-dir published
