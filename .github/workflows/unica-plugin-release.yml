name: Build Unica Codex Plugin

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      rust_changed: ${{ steps.scope.outputs.rust_changed }}
      platform_changed: ${{ steps.scope.outputs.platform_changed }}
      toolchain_changed: ${{ steps.scope.outputs.toolchain_changed }}
      package_changed: ${{ steps.scope.outputs.package_changed }}
      plugin_content_changed: ${{ steps.scope.outputs.plugin_content_changed }}
      ci_changed: ${{ steps.scope.outputs.ci_changed }}
      release_required: ${{ steps.scope.outputs.release_required }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: scope
        shell: bash
        env:
          FORCE_FULL: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:full') }}
        run: |
          set -euo pipefail
          if [ "$FORCE_FULL" = "true" ]; then
            python scripts/ci/classify-workflow-changes.py --force-full </dev/null >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only FETCH_HEAD...HEAD |
            python scripts/ci/classify-workflow-changes.py >> "$GITHUB_OUTPUT"

  verify-source:
    name: Verify source guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python -m pip install -r tests/ci/requirements.txt
      - run: python -m unittest discover -s tests/ci --durations 20
      - run: python -m py_compile scripts/ci/*.py tests/ci/*.py
      - run: python scripts/ci/check-version-contract.py

  test-rust-primary:
    name: Rust tests (macos-14 primary)
    runs-on: macos-14
    timeout-minutes: 60
    needs: classify-changes
    if: >-
      ${{
        needs.classify-changes.outputs.rust_changed == 'true' &&
        needs.classify-changes.outputs.platform_changed == 'false' &&
        needs.classify-changes.outputs.toolchain_changed == 'false' &&
        needs.classify-changes.outputs.ci_changed == 'false'
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace -- --test-threads=1

  test-rust-platforms:
    name: Rust tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: classify-changes
    if: >-
      ${{
        needs.classify-changes.outputs.platform_changed == 'true' ||
        needs.classify-changes.outputs.toolchain_changed == 'true' ||
        needs.classify-changes.outputs.ci_changed == 'true'
      }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace -- --test-threads=1

  build-tools:
    name: Build tools (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    needs: [classify-changes, verify-source, test-rust-primary, test-rust-platforms]
    if: >-
      ${{
        always() &&
        needs.classify-changes.result == 'success' &&
        needs.verify-source.result == 'success' &&
        (needs.test-rust-primary.result == 'success' || needs.test-rust-primary.result == 'skipped') &&
        (needs.test-rust-platforms.result == 'success' || needs.test-rust-platforms.result == 'skipped') &&
        (needs.classify-changes.outputs.release_required == 'true' ||
         needs.classify-changes.outputs.ci_changed == 'true')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build target bundle and bootstrap
        run: >
          python scripts/ci/build-unica-tools.py
          --repo-root .
          --target "${{ matrix.target }}"
          --lock-file plugins/unica/third-party/tools.lock.json
          --out-dir ".build/tool-bundles/${{ matrix.target }}"
          --work-dir ".build/tool-work/${{ matrix.target }}"
      - name: Check bundled tool contracts
        run: >
          python scripts/ci/check-tool-contracts.py
          --target "${{ matrix.target }}"
          --tools-dir ".build/tool-bundles/${{ matrix.target }}/bin/${{ matrix.target }}"
      - name: Smoke packaged Unica MCP
        shell: bash
        run: |
          executable=".build/tool-bundles/${{ matrix.target }}/bin/${{ matrix.target }}/unica"
          if [ "${{ matrix.target }}" = "win-x64" ]; then executable="${executable}.exe"; fi
          python scripts/ci/smoke-unica-mcp.py \
            --binary "$executable" \
            --plugin-root ".build/tool-bundles/${{ matrix.target }}"
      - uses: actions/upload-artifact@v7
        with:
          name: unica-tools-${{ matrix.target }}
          path: .build/tool-bundles/${{ matrix.target }}
          if-no-files-found: error

  package-runtime:
    name: Package runtime (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-tools
    strategy:
      fail-fast: false
      matrix:
        target: [darwin-arm64, linux-x64, win-x64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: unica-tools-${{ matrix.target }}
          path: .build/bundle
      - run: >
          python scripts/ci/package-unica-runtime.py
          --bundle-root .build/bundle
          --out-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: unica-runtime-${{ matrix.target }}
          path: |
            dist/unica-runtime-${{ matrix.target }}.tar.gz
            dist/unica-runtime-${{ matrix.target }}.json
          if-no-files-found: error

  package-thin:
    name: Package thin marketplace payload
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: package-runtime
    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.8.1' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          pattern: unica-runtime-*
          path: .build/runtime-metadata
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: unica-tools-*
          path: .build/bootstrap-root
          merge-multiple: true
      - run: >
          python scripts/ci/package-unica-plugin.py
          --repo-root .
          --runtime-metadata-root .build/runtime-metadata
          --bootstrap-root .build/bootstrap-root
          --release-tag "$RELEASE_TAG"
          --source-commit "${{ github.sha }}"
          --out-dir dist/thin
      - uses: actions/upload-artifact@v7
        with:
          name: unica-thin-marketplace
          path: dist/thin/marketplace
          include-hidden-files: true
          if-no-files-found: error

  probe-thin-bootstrap:
    name: Probe thin bootstrap (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: package-thin
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-2022
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: unica-thin-marketplace
          path: .build/thin
      - name: Probe packaged bootstrap through the downloader
        run: >
          python scripts/ci/smoke-unica-bootstrap.py
          --plugin-root .build/thin/plugins/unica
          --target "${{ matrix.target }}"
          --expect-download-failure

  release-assessment:
    name: Assess Linux runtime on BSP
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: package-runtime
    if: ${{ always() && needs.package-runtime.result == 'success' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: unica-runtime-linux-x64
          path: dist/runtime
      - name: Run release assessment
        run: >
          python scripts/ci/release-assessment.py
          --package-archive dist/runtime/unica-runtime-linux-x64.tar.gz
          --work-dir .build/release-assessment
          --out-dir dist/release-assessment
          --bsp-ref 3.2.1.446
          --release-tag "${{ github.ref_name }}"
          --github-run-id "${{ github.run_id }}"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unica-release-assessment
          path: dist/release-assessment
          if-no-files-found: warn

  publish-release-assets:
    name: Publish runtime assets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: package-runtime
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: unica-runtime-*
          path: dist/runtime
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/runtime/unica-runtime-*.tar.gz
            dist/runtime/unica-runtime-*.json

  smoke-thin-plugin:
    name: Smoke published thin plugin (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: [package-thin, publish-release-assets]
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-2022
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: unica-thin-marketplace
          path: .build/thin
      - name: Smoke packaged bootstrap against published runtime
        run: >
          python scripts/ci/smoke-unica-bootstrap.py
          --plugin-root .build/thin/plugins/unica
          --target "${{ matrix.target }}"

  verify-published-assets:
    name: Re-download and verify published bytes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - publish-release-assets
      - package-thin
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Download release assets from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "$GITHUB_REF_NAME" --pattern 'unica-runtime-*' --dir published
      - run: python scripts/ci/verify-release-assets.py --asset-dir published

  unica-ci:
    name: Unica CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - classify-changes
      - verify-source
      - test-rust-primary
      - test-rust-platforms
      - build-tools
      - package-runtime
      - package-thin
      - probe-thin-bootstrap
      - release-assessment
      - publish-release-assets
      - smoke-thin-plugin
      - verify-published-assets
    steps:
      - uses: actions/checkout@v7
      - name: Evaluate required CI results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: python scripts/ci/evaluate-ci-gate.py
