name: Build Unica Codex Plugin

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      rust_changed: ${{ steps.scope.outputs.rust_changed }}
      platform_changed: ${{ steps.scope.outputs.platform_changed }}
      toolchain_changed: ${{ steps.scope.outputs.toolchain_changed }}
      package_changed: ${{ steps.scope.outputs.package_changed }}
      plugin_content_changed: ${{ steps.scope.outputs.plugin_content_changed }}
      ci_changed: ${{ steps.scope.outputs.ci_changed }}
      release_required: ${{ steps.scope.outputs.release_required }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: scope
        shell: bash
        env:
          FORCE_FULL: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:full') }}
        run: |
          set -euo pipefail
          if [ "$FORCE_FULL" = "true" ]; then
            python scripts/ci/classify-workflow-changes.py --force-full </dev/null >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only FETCH_HEAD...HEAD |
            python scripts/ci/classify-workflow-changes.py >> "$GITHUB_OUTPUT"

  verify-source:
    name: Verify source guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python -m pip install -r tests/ci/requirements.txt
      - run: python -m unittest discover -s tests/ci --durations 20
      - run: python -m py_compile scripts/ci/*.py tests/ci/*.py
      - run: python scripts/ci/check-version-contract.py

  test-rust-primary:
    name: Rust tests (macos-14 primary)
    runs-on: macos-14
    timeout-minutes: 60
    needs: classify-changes
    if: >-
      ${{
        needs.classify-changes.outputs.rust_changed == 'true' &&
        needs.classify-changes.outputs.platform_changed == 'false' &&
        needs.classify-changes.outputs.toolchain_changed == 'false' &&
        needs.classify-changes.outputs.ci_changed == 'false'
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace -- --test-threads=1

  test-rust-platforms:
    name: Rust tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: classify-changes
    if: >-
      ${{
        needs.classify-changes.outputs.platform_changed == 'true' ||
        needs.classify-changes.outputs.toolchain_changed == 'true' ||
        needs.classify-changes.outputs.ci_changed == 'true'
      }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - if: matrix.runner == 'macos-14'
        run: cargo fmt --all -- --check
      - if: matrix.runner == 'macos-14'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace -- --test-threads=1

  build-tools:
    name: Build tools (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    needs: [classify-changes, verify-source, test-rust-primary, test-rust-platforms]
    if: >-
      ${{
        always() &&
        needs.classify-changes.result == 'success' &&
        needs.verify-source.result == 'success' &&
        (needs.test-rust-primary.result == 'success' || needs.test-rust-primary.result == 'skipped') &&
        (needs.test-rust-platforms.result == 'success' || needs.test-rust-platforms.result == 'skipped') &&
        (needs.classify-changes.outputs.release_required == 'true' ||
         needs.classify-changes.outputs.ci_changed == 'true')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - if: matrix.target == 'win-x64'
        uses: actions/setup-node@v7
        with:
          node-version: "24"
      - name: Install pinned Codex CLI on Windows
        if: matrix.target == 'win-x64'
        shell: bash
        run: |
          set -euo pipefail
          npm install --global @openai/codex@0.145.0-alpha.18
          test "$(codex --version)" = "codex-cli 0.145.0-alpha.18"
      - id: rust-toolchain
        uses: dtolnay/rust-toolchain@stable
      - id: cargo-cache
        name: Restore Cargo target cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: .build/tool-work/${{ matrix.target }}/cargo-target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('Cargo.lock') }}
      - name: Build target bundle and bootstrap
        if: matrix.target != 'win-x64'
        run: >
          python scripts/ci/build-unica-tools.py
          --repo-root .
          --target "${{ matrix.target }}"
          --lock-file plugins/unica/third-party/tools.lock.json
          --out-dir ".build/tool-bundles/${{ matrix.target }}"
          --work-dir .build/tool-work
          --metrics-file ".build/cargo-metrics/${{ matrix.target }}.json"
      - name: Build, install, and verify local development on Windows
        if: matrix.target == 'win-x64'
        shell: bash
        run: |
          set -euo pipefail
          build_root="$PWD/.build"
          codex_home="$(cygpath -m "$build_root/codex-home")"
          CODEX_HOME="$codex_home" \
            scripts/dev/install-local-unica.sh \
              --build-dir "$build_root"

          bundle_manifest="$(find "$build_root/tool-artifacts" \
            -mindepth 2 -maxdepth 2 -name tools.json -print -quit)"
          if [ -z "$bundle_manifest" ]; then
            echo "local installer did not produce a tool bundle" >&2
            exit 66
          fi
          bundle_root="$(dirname "$bundle_manifest")"
          mkdir -p "$PWD/.build/tool-bundles"
          rm -rf "$PWD/.build/tool-bundles/win-x64"
          cp -R "$bundle_root" "$PWD/.build/tool-bundles/win-x64"
      - name: Report Cargo cache and build metrics
        if: always()
        shell: bash
        env:
          CACHE_STEP_OUTCOME: ${{ steps.cargo-cache.outcome }}
          CACHE_HIT: ${{ steps.cargo-cache.outputs.cache-hit }}
          METRICS_FILE: .build/cargo-metrics/${{ matrix.target }}.json
          TARGET: ${{ matrix.target }}
        run: |
          set -u
          cache_outcome=miss
          if [ "$CACHE_STEP_OUTCOME" != "success" ]; then
            cache_outcome=error
          elif [ "$CACHE_HIT" = "true" ]; then
            cache_outcome=exact-hit
          fi
          cargo_seconds="$(python -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["cargoBuildSeconds"])' "$METRICS_FILE" 2>/dev/null || true)"
          if [ -z "$cargo_seconds" ]; then cargo_seconds=unavailable; fi
          {
            echo "### Cargo build ($TARGET)"
            echo
            echo "- Target: \`$TARGET\`"
            echo "- Cache outcome: \`$cache_outcome\`"
            echo "- Cargo build duration: \`$cargo_seconds\` seconds"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Check bundled tool contracts
        run: >
          python scripts/ci/check-tool-contracts.py
          --target "${{ matrix.target }}"
          --tools-dir ".build/tool-bundles/${{ matrix.target }}/bin/${{ matrix.target }}"
      - name: Smoke packaged Unica MCP
        shell: bash
        run: |
          executable=".build/tool-bundles/${{ matrix.target }}/bin/${{ matrix.target }}/unica"
          if [ "${{ matrix.target }}" = "win-x64" ]; then executable="${executable}.exe"; fi
          python scripts/ci/smoke-unica-mcp.py \
            --binary "$executable" \
            --plugin-root ".build/tool-bundles/${{ matrix.target }}"
      - name: Package deterministic runtime
        run: >
          python scripts/ci/package-unica-runtime.py
          --bundle-root ".build/tool-bundles/${{ matrix.target }}"
          --out-dir ".build/runtime-assets/${{ matrix.target }}"
      - name: Verify local runtime asset pair
        run: >
          python scripts/ci/verify-release-assets.py
          --asset-dir ".build/runtime-assets/${{ matrix.target }}"
          --target "${{ matrix.target }}"
      - name: Stage exact bootstrap payload
        shell: bash
        run: |
          bootstrap_name=unica-bootstrap
          if [ "${{ matrix.target }}" = "win-x64" ]; then bootstrap_name="${bootstrap_name}.exe"; fi
          destination=".build/bootstrap-artifacts/${{ matrix.target }}/bootstrap/bin/${{ matrix.target }}"
          mkdir -p "$destination"
          cp ".build/tool-bundles/${{ matrix.target }}/bootstrap/bin/${{ matrix.target }}/${bootstrap_name}" "$destination/"
      - name: Upload runtime metadata
        uses: actions/upload-artifact@v7
        with:
          name: unica-runtime-metadata-${{ matrix.target }}
          path: .build/runtime-assets/${{ matrix.target }}/unica-runtime-${{ matrix.target }}.json
          if-no-files-found: error
          retention-days: 1
      - name: Upload bootstrap payload
        uses: actions/upload-artifact@v7
        with:
          name: unica-bootstrap-${{ matrix.target }}
          path: .build/bootstrap-artifacts/${{ matrix.target }}
          if-no-files-found: error
          retention-days: 1
      - name: Upload required runtime archive
        if: ${{ matrix.target == 'linux-x64' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) }}
        uses: actions/upload-artifact@v7
        with:
          name: unica-runtime-${{ matrix.target }}
          path: .build/runtime-assets/${{ matrix.target }}/unica-runtime-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  package-thin:
    name: Package thin marketplace payload
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-tools
    if: ${{ always() && needs.build-tools.result == 'success' }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.8.1' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          pattern: unica-runtime-metadata-*
          path: .build/runtime-metadata
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: unica-bootstrap-*
          path: .build/bootstrap-root
          merge-multiple: true
      - run: >
          python scripts/ci/package-unica-plugin.py
          --repo-root .
          --runtime-metadata-root .build/runtime-metadata
          --bootstrap-root .build/bootstrap-root
          --release-tag "$RELEASE_TAG"
          --source-commit "${{ github.sha }}"
          --out-dir dist/thin
      - uses: actions/upload-artifact@v7
        with:
          name: unica-thin-marketplace
          path: dist/thin/marketplace
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90

  probe-thin-bootstrap:
    name: Probe thin bootstrap (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: package-thin
    if: >-
      ${{
        always() &&
        needs.package-thin.result == 'success' &&
        (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-2022
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: unica-thin-marketplace
          path: .build/thin
      - name: Probe packaged bootstrap through the downloader
        run: >
          python scripts/ci/smoke-unica-bootstrap.py
          --plugin-root .build/thin/plugins/unica
          --target "${{ matrix.target }}"
          --expect-download-failure

  release-assessment:
    name: Assess Linux runtime on BSP
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-tools
    if: ${{ always() && needs.build-tools.result == 'success' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: unica-runtime-linux-x64
          path: dist/runtime
      - name: Run release assessment
        run: >
          python scripts/ci/release-assessment.py
          --package-archive dist/runtime/unica-runtime-linux-x64.tar.gz
          --work-dir .build/release-assessment
          --out-dir dist/release-assessment
          --bsp-ref 3.2.1.446
          --release-tag "${{ github.ref_name }}"
          --github-run-id "${{ github.run_id }}"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unica-release-assessment
          path: dist/release-assessment
          if-no-files-found: warn
          retention-days: 1

  publish-release-assets:
    name: Publish runtime assets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-tools
    if: >-
      ${{
        always() &&
        needs.build-tools.result == 'success' &&
        github.event_name == 'push' &&
        startsWith(github.ref, 'refs/tags/')
      }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: unica-runtime-*
          path: dist/runtime
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/runtime/unica-runtime-*.tar.gz
            dist/runtime/unica-runtime-*.json

  smoke-thin-plugin:
    name: Smoke published thin plugin (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: [package-thin, publish-release-assets]
    if: >-
      ${{
        always() &&
        needs.package-thin.result == 'success' &&
        needs.publish-release-assets.result == 'success' &&
        github.event_name == 'push' &&
        startsWith(github.ref, 'refs/tags/')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-2022
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: unica-thin-marketplace
          path: .build/thin
      - name: Smoke packaged bootstrap against published runtime
        run: >
          python scripts/ci/smoke-unica-bootstrap.py
          --plugin-root .build/thin/plugins/unica
          --target "${{ matrix.target }}"

  verify-published-assets:
    name: Re-download and verify published bytes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - publish-release-assets
      - package-thin
    if: >-
      ${{
        always() &&
        needs.package-thin.result == 'success' &&
        needs.publish-release-assets.result == 'success' &&
        github.event_name == 'push' &&
        startsWith(github.ref, 'refs/tags/')
      }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Download release assets from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "$GITHUB_REF_NAME" --pattern 'unica-runtime-*' --dir published
      - run: python scripts/ci/verify-release-assets.py --asset-dir published

  unica-ci:
    name: Unica CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - classify-changes
      - verify-source
      - test-rust-primary
      - test-rust-platforms
      - build-tools
      - package-thin
      - probe-thin-bootstrap
      - release-assessment
      - publish-release-assets
      - smoke-thin-plugin
      - verify-published-assets
    steps:
      - uses: actions/checkout@v7
      - name: Evaluate required CI results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: python scripts/ci/evaluate-ci-gate.py
